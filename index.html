<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javier Piay — LinkedIn Activity</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 2rem; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.tabs { display: flex; border-bottom: 1.5px solid #e0e0e0; margin-bottom: 1.25rem; }
.tab { font-size: 14px; padding: 8px 20px; cursor: pointer; border: none; background: transparent; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1.5px; }
.tab:hover { color: #1a1a1a; }
.tab.active { color: #1a1a1a; font-weight: 500; border-bottom-color: #1a1a1a; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.fb { font-size: 12px; padding: 4px 14px; border-radius: 99px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #555; }
.fb:hover { border-color: #aaa; }
.fb.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.count { font-size: 12px; color: #aaa; margin-bottom: 10px; }
.row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
.row:last-child { border-bottom: none; }
.num { font-size: 12px; color: #bbb; min-width: 24px; text-align: right; padding-top: 2px; flex-shrink: 0; }
.title-link { font-size: 14px; color: #1a1a1a; flex: 1; line-height: 1.5; text-decoration: none; }
.title-link:hover { color: #0077b5; text-decoration: underline; }
.no-url { font-size: 14px; color: #888; flex: 1; line-height: 1.5; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
.tag-ai     { background: #e8f0fe; color: #1a56d6; }
.tag-edu    { background: #e6f4ea; color: #1e6e3a; }
.tag-career { background: #fef9e0; color: #a06000; }
.tag-tech   { background: #e1f5ee; color: #0f6e56; }
.tag-phil   { background: #eeedfe; color: #3c3489; }
.tag-es     { background: #f3f3f3; color: #555; }
.panel { display: none; }
.panel.active { display: block; }
footer { margin-top: 2rem; font-size: 12px; color: #bbb; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>Javier Piay Pombo</h1>
  <p class="subtitle">LinkedIn Activity — Articles &amp; Posts &nbsp;·&nbsp; Last updated April 2026</p>
  <div class="tabs">
    <button class="tab active" id="tab-articles" onclick="switchTab(this,'articles')">Articles</button>
    <button class="tab" id="tab-posts" onclick="switchTab(this,'posts')">Posts</button>
  </div>

  <div class="panel active" id="panel-articles">
    <div class="filter-row" id="art-filters">
      <button class="fb active" onclick="filterArt(this,'all')">All</button>
      <button class="fb" onclick="filterArt(this,'ai')">AI</button>
      <button class="fb" onclick="filterArt(this,'edu')">Education</button>
      <button class="fb" onclick="filterArt(this,'tech')">Tech</button>
      <button class="fb" onclick="filterArt(this,'career')">Career</button>
      <button class="fb" onclick="filterArt(this,'phil')">Philosophy</button>
      <button class="fb" onclick="filterArt(this,'es')">Español</button>
    </div>
    <div class="count" id="art-count"></div>
    <div id="art-list"></div>
  </div>

  <div class="panel" id="panel-posts">
    <p style="font-size:13px;color:#aaa;margin-bottom:1rem;">Non-comprehensive — older posts not included.</p>
    <div class="count" id="post-count"></div>
    <div id="post-list"></div>
  </div>

  <footer>linkedin.com/in/javierpiay</footer>
</div>
<script src="data.js"></script>
<script>
const tl={ai:"AI",edu:"Education",tech:"Tech",career:"Career",phil:"Philosophy",es:"Español"};
const tc={ai:"tag-ai",edu:"tag-edu",tech:"tag-tech",career:"tag-career",phil:"tag-phil",es:"tag-es"};

function switchTab(btn,id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

let artCur='all';
function filterArt(btn,cat){
  artCur=cat;
  document.querySelectorAll('#art-filters .fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}
function renderArticles(){
  const f=artCur==='all'?articles:articles.filter(a=>a.tags.includes(artCur));
  document.getElementById('art-count').textContent=f.length+' article'+(f.length!==1?'s':'');
  document.getElementById('art-list').innerHTML=f.map((a,i)=>
    `<div class="row"><span class="num">${articles.indexOf(a)+1}</span><a class="title-link" href="${a.url}" target="_blank">${a.title}</a>${a.tags.map(t=>`<span class="tag ${tc[t]}">${tl[t]}</span>`).join('')}</div>`
  ).join('');
}
function renderPosts(){
  document.getElementById('post-count').textContent=posts.length+' posts';
  document.getElementById('post-list').innerHTML=posts.map((p,i)=>
    `<div class="row"><span class="num">${i+1}</span><a class="title-link" href="${p.url}" target="_blank">${p.title}</a></div>`
  ).join('');
}
document.getElementById('tab-articles').textContent='Articles ('+articles.length+')';
document.getElementById('tab-posts').textContent='Posts ('+posts.length+')';
renderArticles();
renderPosts();
</script>
</body>
</html>
